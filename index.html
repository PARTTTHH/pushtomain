<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PushToMain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h1>PushToMain</h1>
    </nav>

    <main>

        <aside class="sidebar">

            <button class="add-task-btn">+ Add New Task</button>

            <div class="stat-cards">

                <div class="stat-card">
                    <h3>Total To Do</h3>
                    <span class="count todo-count">0</span>
                </div>

                <div class="stat-card">
                    <h3>Total In Progress</h3>
                    <span class="count progress-count">0</span>
                </div>

                <div class="stat-card">
                    <h3>Total Done Today</h3>
                    <span class="count done-count">0</span>
                </div>

            </div>

        </aside>

        <section class="kanban-board">

            <div class="kanban-col" id="col-todo">
                <div class="col-header">
                    <span class="col-icon todo-icon"></span>
                    <h2>To Do</h2>
                </div>
                <div class="card-list" id="todo-list">
                    <!-- cards here -->
                </div>
            </div>

            <div class="kanban-col" id="col-progress">
                <div class="col-header">
                    <span class="col-icon progress-icon"></span>
                    <h2>In Progress</h2>
                </div>
                <div class="card-list" id="progress-list">
                    <!-- cards here -->
                </div>
            </div>

            <div class="kanban-col" id="col-done">
                <div class="col-header">
                    <span class="col-icon done-icon"></span>
                    <h2>Done</h2>
                </div>
                <div class="card-list" id="done-list">
                    <!-- cards here -->
                </div>
            </div>

        </section>

    </main>

    <div class="modal-overlay" id="modalOverlay">
    <div class="modal">

        <div class="modal-header">
            <h2>New Task</h2>
            <button class="modal-close" id="closeModal">✕</button>
        </div>

        <div class="modal-body">
            <div class="form-group">
                <label for="task-title">Title</label>
                <input type="text" id="task-title" placeholder="What needs to be done?" />
            </div>

            <div class="form-group">
                <label for="task-desc">Description</label>
                <textarea id="task-desc" placeholder="Add some detail..."></textarea>
            </div>

            <div class="form-group">
                <label for="task-tags">Tags</label>
                <input type="text" id="task-tags" placeholder="Bug, Feature, Story..." />
            </div>

            <div class="form-group">
                <label for="task-col">Column</label>
                <select id="task-col">
                    <option value="todo">To Do</option>
                    <option value="progress">In Progress</option>
                    <option value="done">Done</option>
                </select>
            </div>
        </div>

        <div class="modal-footer">
            <button class="btn-cancel" id="cancelTask">Cancel</button>
            <button class="btn-submit" id="submitTask">Add Task</button>
        </div>

    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
